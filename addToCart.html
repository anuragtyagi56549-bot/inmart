<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Cart</title>
  <link rel="stylesheet" href="addToCart.css" />
</head>
<body>

  <header class="top-bar">
  <h2>← Cart</h2>
</header>

<div class="save-banner">
  Yay! You saved ₹78 on this order ✔
</div>

<section class="cart-box">
  <div class="offer">
    <span>🏷️ View Coupons & Offers</span>
    <span>›</span>
  </div>

  <div class="delivery">
    ⚡ Delivery in 6 mins
  </div>

  <div id="productCartContainer"></div>

  <div class="add-more">
    <span>Missed something?</span>
    <button>+ Add More Items</button>
  </div>
</section>

<section class="bill-box">
  <h3>🧾 Bill summary</h3>

  <div class="bill-row">
    <span>Item Total</span>
    <span class="productSubTotal">₹0</span>
  </div>

  <div class="bill-row">
    <span>Handling Fee</span>
    <span class="handling">FREE</span>
  </div>

  <div class="bill-row">
    <span>Delivery Fee</span>
    <span class="deliveryFee">₹30</span>
  </div>

  <hr>

  <div class="bill-row total">
    <span>To Pay</span>
    <span class="productFinalTotal">₹0</span>
  </div>
</section>

<div class="checkout-bar">
  Add Address to proceed
</div>

  <script src="cart.js"></script>
</body>
</html>
